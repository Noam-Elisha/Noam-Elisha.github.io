  <main class="contact-page">
    <section class="section" style="padding-top: 8rem;">
      <div class="container">
        <div class="section-label">Contact</div>
        <h1 class="section-title">Send a Message</h1>
        <p class="section-subtitle">Use the form below to ask about lessons, scheduling, or anything else.</p>

        <div class="contact-form-wrap reveal">
          <form class="contact-form" action="https://formsubmit.co/el/miwili" method="POST">
            <input type="hidden" name="_captcha" value="false" />
            <input type="hidden" name="_subject" value="New Website Contact Form Submission" />
            <input type="hidden" name="_template" value="table" />

            <label for="name">Name</label>
            <input id="name" name="name" type="text" required />

            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>

            <button type="submit" class="btn btn-primary">Send Message</button>
          </form>
        </div>
      </div>
    </section>
  </main>
